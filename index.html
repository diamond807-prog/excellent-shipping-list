<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出貨核對清單</title>
  <link rel="apple-touch-icon" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;
  background:#f6f1ea;
  color:#3d352d;
  user-select:none;
}
.app{max-width:760px;margin:auto;padding:16px}
h1{font-size:26px;margin:8px 0 12px}
.card,.customer{
  background:#fffdf9;
  border-radius:22px;
  padding:14px;
  margin:14px 0;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
textarea,input,select{
  width:100%;
  box-sizing:border-box;
  border:1px solid #d8cbbb;
  border-radius:16px;
  padding:13px;
  font-size:17px;
  background:#fffdf9;
}
textarea{min-height:180px}
button{
  border:0;
  border-radius:999px;
  padding:11px 16px;
  margin:6px 4px 6px 0;
  font-size:15px;
  background:#46624a;
  color:white;
}
button.secondary{background:#a9957d}
button.danger{background:#a85d53}
button.light{background:#e7dccf;color:#3d352d}
button.active{background:#46624a;color:white}
.toolbar{
  position:sticky;
  top:0;
  z-index:10;
  background:#f6f1ea;
  padding:8px 0;
}
.searchWrap{
  position:relative;
}
.searchWrap input{
  padding-right:52px;
}
.clearSearchBtn{
  position:absolute;
  right:9px;
  top:50%;
  transform:translateY(-50%);
  width:34px;
  height:34px;
  border-radius:50%;
  border:none;
  background:#d9d0c5;
  color:#5f554c;
  font-size:18px;
  line-height:34px;
  display:none;
  padding:0;
  margin:0;
}
.customer.done{opacity:.48}
.customerTitle{
  font-size:21px;
  font-weight:700;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.priority{color:#c83d35}
.badge{
  font-size:13px;
  background:#eee4d8;
  padding:4px 9px;
  border-radius:999px;
}
.itemWrap{
  position:relative;
  overflow:hidden;
  border-bottom:1px solid #eee6dc;
}
.itemActions{
  position:absolute;
  right:0;
  top:0;
  height:100%;
  display:flex;
}
.itemActions button{
  border-radius:0;
  margin:0;
  padding:0 14px;
}
.item{
  position:relative;
  z-index:2;
  background:#fffdf9;
  display:flex;
  align-items:flex-start;
  gap:11px;
  padding:11px 0;
  font-size:19px;
  transition:transform .2s ease;
}
.circle{
  width:25px;
  height:25px;
  border:2px solid #887d72;
  border-radius:50%;
  flex-shrink:0;
  box-sizing:border-box;
  margin-top:1px;
}
.item.checked .circle{
  background:#46624a;
  border-color:#46624a;
  position:relative;
}
.item.checked .circle:after{
  content:"✓";
  position:absolute;
  color:white;
  font-size:18px;
  left:5px;
  top:-1px;
}
.item.checked .text{
  color:#999;
  text-decoration:line-through;
}
.meta{
  font-size:13px;
  color:#8b8177;
  margin-top:4px;
}
.smallHint{
  font-size:14px;
  color:#8b8177;
  line-height:1.6;
}
.hidden{display:none}
.empty{text-align:center;color:#8b8177;padding:24px}
.addBox{
  background:#f7f1e8;
  border-radius:18px;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="app">
  <h1>今日出貨同步核對</h1>

  <div class="card">
    <label>我是誰？</label>
    <select id="userSelect" onchange="saveUser()">
      <option value="">請選擇人員</option>
      <option value="小玟">小玟</option>
      <option value="小予">小予</option>
      <option value="阿聖">阿聖</option>
      <option value="弟弟">弟弟</option>
    </select>
  </div>

  <div class="card">
    <textarea id="input" placeholder="第一次建立今日清單才貼整份：

❤️★麻希達
蘿蔔絲1.6斤
青江5斤

★黑皮驊
明豬血9
高麗菜大"></textarea>

    <button onclick="createTodayList()">產生今日出貨</button>
    <button class="danger" onclick="clearToday()">清空今日出貨</button>
    <div class="smallHint">注意：產生今日出貨會覆蓋目前清單；追加商品請用客戶底下的「＋新增品項」。</div>
  </div>

  <div id="summary" class="card hidden"></div>

  <div class="card">
    <div class="searchWrap">
      <input
        id="searchInput"
        placeholder="搜尋商品，例如：豆腐、高麗、豬血"
        oninput="toggleClearBtn(); render();">
      <button
        id="clearSearchBtn"
        class="clearSearchBtn"
        onclick="clearSearch()"
        aria-label="清除搜尋">
        ×
      </button>
    </div>

    <div>
      <button class="light active" id="filterAll" onclick="setFilter('all')">全部</button>
      <button class="light" id="filterTodo" onclick="setFilter('todo')">未完成</button>
      <button class="light" id="filterDone" onclick="setFilter('done')">已完成</button>
      <button class="secondary" onclick="collapseDone=!collapseDone;render()">收合已完成</button>
    </div>
    <div id="syncStatus" class="smallHint">同步狀態：連線中...</div>
  </div>

  <div class="card">
    <b>＋新增客戶</b>
    <input id="newCustomerName" placeholder="客戶名稱，例如：星饗">
    <label class="smallHint">
      <input type="checkbox" id="newCustomerPriority"> ❤️ 優先客戶
    </label><br>
    <button onclick="addCustomer()">新增客戶</button>
  </div>

  <div id="list"></div>
</div>

<script>
const SUPABASE_URL = "https://ibhdppkdxxkdyfhtxvsk.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_8rrL7NRxbpY6ie-RFOiHrA_3u9yiobi";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let items = [];
let filterMode = "all";
let collapseDone = false;

window.onload = async () => {
  const savedUser = localStorage.getItem("shipmentUser");
  if(savedUser) document.getElementById("userSelect").value = savedUser;
  await loadItems();
  subscribeRealtime();
  toggleClearBtn();
};

function saveUser(){
  localStorage.setItem("shipmentUser", document.getElementById("userSelect").value);
}

function getUser(){
  const user = document.getElementById("userSelect").value;
  if(!user){
    alert("先選擇妳是誰喔～");
    return null;
  }
  return user;
}

async function loadItems(){
  const { data, error } = await db
    .from("shipment_items")
    .select("*")
    .order("priority", { ascending:false })
    .order("customer_index", { ascending:true })
    .order("item_index", { ascending:true });

  if(error){
    alert("讀取失敗：" + error.message);
    return;
  }

  items = data || [];
  render();
}

function subscribeRealtime(){
  db.channel("shipment_items_changes")
    .on("postgres_changes", {
      event:"*",
      schema:"public",
      table:"shipment_items"
    }, async () => {
      await loadItems();
    })
    .subscribe(status => {
      document.getElementById("syncStatus").textContent = "同步狀態：" + status;
    });
}

function parseInput(raw){
  const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  const result = [];
  let current = null;
  let customerIndex = -1;

  lines.forEach(line=>{
    if(line.includes("★")){
      customerIndex++;
      const priority = line.includes("❤️") || line.includes("❤");
      const name = line.replace(/❤️|❤|★/g,"").trim();

      current = {
        customer_index:customerIndex,
        customer_name:name,
        priority,
        item_index:0
      };
    }else if(current){
      result.push({
        customer_index:current.customer_index,
        customer_name:current.customer_name,
        priority:current.priority,
        item_index:current.item_index++,
        item_text:line,
        checked:false,
        checked_by:null,
        checked_at:null
      });
    }
  });

  return result;
}

async function createTodayList(){
  const raw = document.getElementById("input").value.trim();
  if(!raw) return alert("先貼上今日出貨清單～");

  if(!confirm("確定要重新產生今日出貨嗎？目前勾選狀態會全部清除。")) return;

  const newItems = parseInput(raw);
  if(newItems.length === 0) return alert("沒有辨識到品項，客戶名稱前要有 ★ 喔～");

  await db.from("shipment_items").delete().neq("id","00000000-0000-0000-0000-000000000000");
  const { error } = await db.from("shipment_items").insert(newItems);

  if(error) return alert("建立失敗：" + error.message);

  document.getElementById("input").value = "";
  await loadItems();
}

async function toggleItem(item){
  const user = getUser();
  if(!user) return;

  if(item.checked){
    const ok = confirm(`這項已由 ${item.checked_by || "其他人"} 完成。

要取消完成嗎？`);
    if(!ok) return;

    await db.from("shipment_items")
      .update({checked:false,checked_by:null,checked_at:null})
      .eq("id",item.id);
  }else{
    await db.from("shipment_items")
      .update({checked:true,checked_by:user,checked_at:new Date().toISOString()})
      .eq("id",item.id)
      .eq("checked",false);
  }

  await loadItems();
}

async function addItem(customer){
  const text = prompt(`新增給「${customer.customer_name}」的品項：`);
  if(!text || !text.trim()) return;

  const sameCustomerItems = items.filter(i => i.customer_index === customer.customer_index);
  const maxIndex = sameCustomerItems.length
    ? Math.max(...sameCustomerItems.map(i => i.item_index))
    : -1;

  const { error } = await db.from("shipment_items").insert([{
    customer_index:customer.customer_index,
    customer_name:customer.customer_name,
    priority:customer.priority,
    item_index:maxIndex + 1,
    item_text:text.trim(),
    checked:false
  }]);

  if(error) alert("新增失敗：" + error.message);
}

async function editItem(item){
  if(item.checked){
    const ok = confirm(`這項已由 ${item.checked_by || "其他人"} 完成，確定要修改嗎？`);
    if(!ok) return;
  }

  const text = prompt("修改品項：", item.item_text);
  if(!text || !text.trim()) return;

  const { error } = await db
    .from("shipment_items")
    .update({item_text:text.trim()})
    .eq("id",item.id);

  if(error) alert("修改失敗：" + error.message);
}

async function deleteItem(item){
  if(item.checked){
    const ok = confirm(`這項已由 ${item.checked_by || "其他人"} 完成，確定要刪除嗎？`);
    if(!ok) return;
  }else{
    if(!confirm(`確定刪除「${item.item_text}」嗎？`)) return;
  }

  const { error } = await db
    .from("shipment_items")
    .delete()
    .eq("id",item.id);

  if(error) alert("刪除失敗：" + error.message);
}

async function addCustomer(){
  const name = document.getElementById("newCustomerName").value.trim();
  const priority = document.getElementById("newCustomerPriority").checked;

  if(!name) return alert("請輸入客戶名稱～");

  const maxCustomerIndex = items.length
    ? Math.max(...items.map(i => i.customer_index))
    : -1;

  const itemText = prompt(`先新增「${name}」的第一個品項：`);
  if(!itemText || !itemText.trim()) return;

  const { error } = await db.from("shipment_items").insert([{
    customer_index:maxCustomerIndex + 1,
    customer_name:name,
    priority,
    item_index:0,
    item_text:itemText.trim(),
    checked:false
  }]);

  if(error) return alert("新增客戶失敗：" + error.message);

  document.getElementById("newCustomerName").value = "";
  document.getElementById("newCustomerPriority").checked = false;
}

async function clearToday(){
  if(!confirm("確定要清空今日出貨嗎？大家手機上的清單都會消失。")) return;

  const { error } = await db
    .from("shipment_items")
    .delete()
    .neq("id","00000000-0000-0000-0000-000000000000");

  if(error) alert("清空失敗：" + error.message);
}

function groupItems(){
  const map = new Map();

  items.forEach(item=>{
    const key = item.customer_index + "_" + item.customer_name;
    if(!map.has(key)){
      map.set(key,{
        customer_index:item.customer_index,
        customer_name:item.customer_name,
        priority:item.priority,
        items:[]
      });
    }
    map.get(key).items.push(item);
  });

  return Array.from(map.values()).sort((a,b)=>{
    if(a.priority !== b.priority) return Number(b.priority)-Number(a.priority);
    return a.customer_index-b.customer_index;
  });
}

function render(){
  const list = document.getElementById("list");
  const summary = document.getElementById("summary");
  const keyword = document.getElementById("searchInput").value.trim();
  const keywordLower = keyword.toLowerCase();

  toggleClearBtn();
  list.innerHTML = "";

  const groups = groupItems();
  const totalCustomers = groups.length;
  const doneCustomers = groups.filter(g => g.items.every(i=>i.checked)).length;
  const totalItems = items.length;
  const doneItems = items.filter(i=>i.checked).length;

  if(totalItems){
    summary.classList.remove("hidden");
    summary.innerHTML = `
      今日共 <b>${totalCustomers}</b> 組客戶<br>
      客戶完成：<b>${doneCustomers}</b> / ${totalCustomers}<br>
      品項完成：<b>${doneItems}</b> / ${totalItems}
    `;
  }else{
    summary.classList.add("hidden");
    list.innerHTML = `<div class="empty">目前還沒有今日出貨清單～</div>`;
    return;
  }

  groups.forEach(group=>{
    const customerDone = group.items.every(i=>i.checked);

    let visibleItems = group.items.filter(item=>{
      if(keywordLower && !item.item_text.toLowerCase().includes(keywordLower)) return false;
      if(filterMode === "todo" && item.checked) return false;
      if(filterMode === "done" && !item.checked) return false;
      return true;
    });

    if(keywordLower && visibleItems.length === 0) return;
    if(!keywordLower && collapseDone && customerDone) return;

    const card = document.createElement("div");
    card.className = "customer" + (customerDone ? " done" : "");

    const title = document.createElement("div");
    title.className = "customerTitle" + (group.priority ? " priority" : "");
    title.innerHTML = `
      <span>${group.priority ? "❤️" : ""}★ ${escapeHtml(group.customer_name)}</span>
      <span class="badge">${group.items.filter(i=>i.checked).length}/${group.items.length}</span>
    `;
    card.appendChild(title);

    visibleItems.forEach(item=>{
      card.appendChild(createItemRow(item));
    });

    const addBox = document.createElement("div");
    addBox.className = "addBox";
    addBox.innerHTML = `<button onclick='addItem(${JSON.stringify({
      customer_index:group.customer_index,
      customer_name:group.customer_name,
      priority:group.priority
    })})'>＋新增品項</button>`;
    card.appendChild(addBox);

    list.appendChild(card);
  });

  if(!list.innerHTML){
    list.innerHTML = `<div class="empty">目前沒有符合的品項～</div>`;
  }
}

function createItemRow(item){
  const wrap = document.createElement("div");
  wrap.className = "itemWrap";

  const actions = document.createElement("div");
  actions.className = "itemActions";
  actions.innerHTML = `
    <button class="secondary">編輯</button>
    <button class="danger">刪除</button>
  `;
  actions.children[0].onclick = e => { e.stopPropagation(); editItem(item); };
  actions.children[1].onclick = e => { e.stopPropagation(); deleteItem(item); };

  const row = document.createElement("div");
  row.className = "item" + (item.checked ? " checked" : "");
  row.onclick = () => toggleItem(item);

  const timeText = item.checked_at
    ? new Date(item.checked_at).toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})
    : "";

  row.innerHTML = `
    <div class="circle"></div>
    <div>
      <div class="text">${escapeHtml(item.item_text)}</div>
      <div class="meta">${item.checked ? `${escapeHtml(item.checked_by || "")} ${timeText}` : "尚未完成"}</div>
    </div>
  `;

  let startX = 0;
  let currentX = 0;

  row.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
  });

  row.addEventListener("touchmove", e=>{
    currentX = e.touches[0].clientX - startX;
    if(currentX < 0){
      row.style.transform = `translateX(${Math.max(currentX,-120)}px)`;
    }
  });

  row.addEventListener("touchend", ()=>{
    if(currentX < -50){
      row.style.transform = "translateX(-120px)";
    }else{
      row.style.transform = "translateX(0)";
    }
    currentX = 0;
  });

  wrap.appendChild(actions);
  wrap.appendChild(row);

  return wrap;
}

function toggleClearBtn(){
  const input = document.getElementById("searchInput");
  const btn = document.getElementById("clearSearchBtn");
  if(!input || !btn) return;
  btn.style.display = input.value.trim() ? "block" : "none";
}

function clearSearch(){
  const input = document.getElementById("searchInput");
  input.value = "";
  toggleClearBtn();
  render();
  input.focus();
}

function setFilter(mode){
  filterMode = mode;
  document.getElementById("filterAll").classList.remove("active");
  document.getElementById("filterTodo").classList.remove("active");
  document.getElementById("filterDone").classList.remove("active");

  if(mode==="all") document.getElementById("filterAll").classList.add("active");
  if(mode==="todo") document.getElementById("filterTodo").classList.add("active");
  if(mode==="done") document.getElementById("filterDone").classList.add("active");

  render();
}

function escapeHtml(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>
</body>
</html>
